<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <!-- Blueprint grid patterns -->
    <pattern id="gridSmall" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c44040" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <pattern id="gridLarge" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#c44040" stroke-width="1" opacity="0.35"/>
    </pattern>
    <pattern id="gridTiny" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.4" fill="#c44040" opacity="0.2"/>
    </pattern>

    <!-- Radial glows - brighter -->
    <radialGradient id="glowCenter" cx="40%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#932f2f" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#932f2f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#932f2f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTopRight" cx="85%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#b83a3a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottomLeft" cx="10%" cy="90%" r="45%">
      <stop offset="0%" stop-color="#932f2f" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Diagonal hatch -->
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#932f2f" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <pattern id="hatchReverse" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#932f2f" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Base background - brighter -->
  <rect width="1600" height="600" fill="#3a3a3a"/>

  <!-- Blueprint grids -->
  <rect width="1600" height="600" fill="url(#gridTiny)"/>
  <rect width="1600" height="600" fill="url(#gridSmall)"/>
  <rect width="1600" height="600" fill="url(#gridLarge)"/>

  <!-- Hatch overlays -->
  <rect width="1600" height="600" fill="url(#hatch)"/>
  <rect width="1600" height="600" fill="url(#hatchReverse)"/>

  <!-- Radial glows -->
  <rect width="1600" height="600" fill="url(#glowCenter)"/>
  <rect width="1600" height="600" fill="url(#glowTopRight)"/>
  <rect width="1600" height="600" fill="url(#glowBottomLeft)"/>

  <!-- ============ LARGE GEOMETRIC SHAPES ============ -->

  <!-- Bottom-left triangle cluster -->
  <polygon points="0,600 400,600 0,300" fill="#932f2f" opacity="0.1"/>
  <polygon points="0,600 300,600 0,380" fill="#932f2f" opacity="0.07"/>
  <polygon points="0,600 500,600 0,220" fill="none" stroke="#c44040" stroke-width="0.8" opacity="0.2"/>
  <polygon points="50,600 350,600 50,380" fill="none" stroke="#932f2f" stroke-width="0.5" opacity="0.12"/>

  <!-- Top-right triangle cluster -->
  <polygon points="1200,0 1450,160 1600,0" fill="#932f2f" opacity="0.12"/>
  <polygon points="1250,0 1450,130 1600,0" fill="none" stroke="#c44040" stroke-width="1" opacity="0.25"/>
  <polygon points="1300,0 1420,80 1540,0" fill="none" stroke="#932f2f" stroke-width="0.6" opacity="0.15"/>
  <polygon points="1600,0 1600,200 1350,0" fill="#932f2f" opacity="0.05"/>

  <!-- Center-right rectangle cluster -->
  <rect x="1020" y="160" width="220" height="220" fill="none" stroke="#c44040" stroke-width="0.8" opacity="0.2" transform="rotate(15 1130 270)"/>
  <rect x="1060" y="200" width="140" height="140" fill="#932f2f" opacity="0.06" transform="rotate(15 1130 270)"/>
  <rect x="1060" y="200" width="140" height="140" fill="none" stroke="#932f2f" stroke-width="0.5" opacity="0.15" transform="rotate(15 1130 270)"/>
  <rect x="990" y="130" width="300" height="300" fill="none" stroke="#932f2f" stroke-width="0.4" opacity="0.12" transform="rotate(15 1140 280)"/>
  <rect x="1100" y="240" width="60" height="60" fill="#932f2f" opacity="0.08" transform="rotate(30 1130 270)"/>

  <!-- Left-center rectangle cluster -->
  <rect x="80" y="280" width="160" height="160" fill="none" stroke="#c44040" stroke-width="0.6" opacity="0.15" transform="rotate(-10 160 360)"/>
  <rect x="100" y="300" width="120" height="120" fill="none" stroke="#932f2f" stroke-width="0.4" opacity="0.1" transform="rotate(-10 160 360)"/>
  <rect x="130" y="330" width="60" height="60" fill="#932f2f" opacity="0.05" transform="rotate(-10 160 360)"/>

  <!-- Left side concentric circles -->
  <circle cx="220" cy="140" r="120" fill="none" stroke="#c44040" stroke-width="0.6" opacity="0.2"/>
  <circle cx="220" cy="140" r="90" fill="none" stroke="#932f2f" stroke-width="0.5" opacity="0.15"/>
  <circle cx="220" cy="140" r="60" fill="none" stroke="#932f2f" stroke-width="0.4" opacity="0.12"/>
  <circle cx="220" cy="140" r="30" fill="#932f2f" opacity="0.06"/>
  <circle cx="220" cy="140" r="5" fill="#c44040" opacity="0.15"/>

  <!-- Right-bottom concentric circles -->
  <circle cx="1350" cy="480" r="80" fill="none" stroke="#c44040" stroke-width="0.5" opacity="0.18"/>
  <circle cx="1350" cy="480" r="55" fill="none" stroke="#932f2f" stroke-width="0.4" opacity="0.12" stroke-dasharray="4 8"/>
  <circle cx="1350" cy="480" r="30" fill="none" stroke="#932f2f" stroke-width="0.3" opacity="0.1" stroke-dasharray="2 5"/>
  <circle cx="1350" cy="480" r="10" fill="#932f2f" opacity="0.08"/>

  <!-- Mid-top arc -->
  <circle cx="800" cy="-100" r="300" fill="none" stroke="#932f2f" stroke-width="0.6" opacity="0.12"/>
  <circle cx="800" cy="-100" r="260" fill="none" stroke="#932f2f" stroke-width="0.4" opacity="0.08"/>

  <!-- ============ SCATTERED SHAPES ============ -->

  <!-- Small rotated squares -->
  <rect x="500" y="70" width="20" height="20" fill="#932f2f" opacity="0.12" transform="rotate(20 510 80)"/>
  <rect x="500" y="70" width="20" height="20" fill="none" stroke="#c44040" stroke-width="0.5" opacity="0.18" transform="rotate(35 510 80)"/>
  <rect x="750" y="440" width="16" height="16" fill="#932f2f" opacity="0.1" transform="rotate(-15 758 448)"/>
  <rect x="1350" y="380" width="24" height="24" fill="none" stroke="#c44040" stroke-width="0.6" opacity="0.15" transform="rotate(30 1362 392)"/>
  <rect x="400" y="370" width="18" height="18" fill="#932f2f" opacity="0.08" transform="rotate(45 409 379)"/>
  <rect x="950" y="500" width="14" height="14" fill="none" stroke="#932f2f" stroke-width="0.4" opacity="0.12" transform="rotate(22 957 507)"/>
  <rect x="620" y="520" width="10" height="10" fill="#932f2f" opacity="0.07" transform="rotate(-20 625 525)"/>
  <rect x="1150" y="50" width="18" height="18" fill="none" stroke="#932f2f" stroke-width="0.5" opacity="0.14" transform="rotate(40 1159 59)"/>

  <!-- Hexagons -->
  <polygon points="650,95 685,75 720,95 720,135 685,155 650,135" fill="none" stroke="#c44040" stroke-width="0.6" opacity="0.18"/>
  <polygon points="660,100 680,88 700,100 700,128 680,140 660,128" fill="#932f2f" opacity="0.04"/>
  <polygon points="1050,480 1075,465 1100,480 1100,510 1075,525 1050,510" fill="none" stroke="#932f2f" stroke-width="0.5" opacity="0.12"/>
  <polygon points="350,120 370,108 390,120 390,144 370,156 350,144" fill="none" stroke="#932f2f" stroke-width="0.4" opacity="0.1"/>

  <!-- ============ BLUEPRINT DIMENSION LINES ============ -->

  <!-- Bottom dimension line -->
  <line x1="80" y1="530" x2="520" y2="530" stroke="#c44040" stroke-width="0.6" opacity="0.25"/>
  <line x1="80" y1="523" x2="80" y2="537" stroke="#c44040" stroke-width="0.6" opacity="0.25"/>
  <line x1="520" y1="523" x2="520" y2="537" stroke="#c44040" stroke-width="0.6" opacity="0.25"/>
  <line x1="300" y1="525" x2="300" y2="535" stroke="#c44040" stroke-width="0.4" opacity="0.15"/>

  <!-- Right vertical dimension -->
  <line x1="1480" y1="60" x2="1480" y2="400" stroke="#c44040" stroke-width="0.5" opacity="0.2"/>
  <line x1="1473" y1="60" x2="1487" y2="60" stroke="#c44040" stroke-width="0.5" opacity="0.2"/>
  <line x1="1473" y1="400" x2="1487" y2="400" stroke="#c44040" stroke-width="0.5" opacity="0.2"/>
  <line x1="1475" y1="230" x2="1485" y2="230" stroke="#c44040" stroke-width="0.3" opacity="0.12"/>

  <!-- Top dimension line -->
  <line x1="600" y1="30" x2="900" y2="30" stroke="#932f2f" stroke-width="0.4" opacity="0.15"/>
  <line x1="600" y1="25" x2="600" y2="35" stroke="#932f2f" stroke-width="0.4" opacity="0.15"/>
  <line x1="900" y1="25" x2="900" y2="35" stroke="#932f2f" stroke-width="0.4" opacity="0.15"/>

  <!-- ============ CROSSHAIRS ============ -->

  <g opacity="0.2" stroke="#c44040" stroke-width="0.6">
    <line x1="785" y1="290" x2="815" y2="290"/>
    <line x1="800" y1="275" x2="800" y2="305"/>
    <circle cx="800" cy="290" r="8" fill="none"/>
    <circle cx="800" cy="290" r="3" fill="none"/>
  </g>
  <g opacity="0.15" stroke="#c44040" stroke-width="0.5">
    <line x1="385" y1="195" x2="415" y2="195"/>
    <line x1="400" y1="180" x2="400" y2="210"/>
    <circle cx="400" cy="195" r="7" fill="none"/>
  </g>
  <g opacity="0.12" stroke="#932f2f" stroke-width="0.4">
    <line x1="1200" y1="140" x2="1220" y2="140"/>
    <line x1="1210" y1="130" x2="1210" y2="150"/>
    <circle cx="1210" cy="140" r="5" fill="none"/>
  </g>
  <g opacity="0.1" stroke="#932f2f" stroke-width="0.4">
    <line x1="550" y1="460" x2="570" y2="460"/>
    <line x1="560" y1="450" x2="560" y2="470"/>
    <circle cx="560" cy="460" r="5" fill="none"/>
  </g>

  <!-- ============ ARCHITECTURAL GUIDE LINES ============ -->

  <line x1="0" y1="200" x2="700" y2="0" stroke="#c44040" stroke-width="0.5" opacity="0.12"/>
  <line x1="900" y1="600" x2="1600" y2="250" stroke="#c44040" stroke-width="0.5" opacity="0.12"/>
  <line x1="500" y1="600" x2="1200" y2="0" stroke="#932f2f" stroke-width="0.4" opacity="0.08"/>
  <line x1="0" y1="450" x2="400" y2="0" stroke="#932f2f" stroke-width="0.3" opacity="0.07"/>
  <line x1="1200" y1="600" x2="1600" y2="100" stroke="#932f2f" stroke-width="0.3" opacity="0.07"/>
  <line x1="0" y1="0" x2="1600" y2="600" stroke="#932f2f" stroke-width="0.2" opacity="0.04"/>
  <line x1="0" y1="600" x2="1600" y2="0" stroke="#932f2f" stroke-width="0.2" opacity="0.04"/>

  <!-- ============ CORNER BRACKETS ============ -->

  <g stroke="#c44040" stroke-width="0.8" opacity="0.22" fill="none">
    <path d="M 25,25 L 25,65 M 25,25 L 65,25"/>
    <path d="M 1575,25 L 1575,65 M 1575,25 L 1535,25"/>
    <path d="M 1575,575 L 1575,535 M 1575,575 L 1535,575"/>
    <path d="M 25,575 L 25,535 M 25,575 L 65,575"/>
  </g>
  <!-- Inner brackets -->
  <g stroke="#932f2f" stroke-width="0.5" opacity="0.12" fill="none">
    <path d="M 50,50 L 50,80 M 50,50 L 80,50"/>
    <path d="M 1550,550 L 1550,520 M 1550,550 L 1520,550"/>
  </g>

  <!-- ============ PLUS SIGNS ============ -->

  <g stroke="#c44040" stroke-width="0.6" opacity="0.16">
    <line x1="900" y1="136" x2="900" y2="156"/>
    <line x1="890" y1="146" x2="910" y2="146"/>
  </g>
  <g stroke="#932f2f" stroke-width="0.5" opacity="0.12">
    <line x1="300" y1="446" x2="300" y2="466"/>
    <line x1="290" y1="456" x2="310" y2="456"/>
  </g>
  <g stroke="#932f2f" stroke-width="0.4" opacity="0.1">
    <line x1="1100" y1="550" x2="1100" y2="566"/>
    <line x1="1092" y1="558" x2="1108" y2="558"/>
  </g>
  <g stroke="#932f2f" stroke-width="0.4" opacity="0.08">
    <line x1="700" y1="350" x2="700" y2="364"/>
    <line x1="693" y1="357" x2="707" y2="357"/>
  </g>

  <!-- ============ DASHED PATHS ============ -->

  <path d="M 100,250 Q 300,150 500,250" fill="none" stroke="#932f2f" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.12"/>
  <path d="M 1100,450 Q 1300,350 1500,450" fill="none" stroke="#932f2f" stroke-width="0.4" stroke-dasharray="4 6" opacity="0.1"/>
  <path d="M 600,300 L 800,200 L 1000,300" fill="none" stroke="#c44040" stroke-width="0.4" stroke-dasharray="3 5" opacity="0.1"/>

  <!-- ============ CONCENTRIC DIAMOND ============ -->

  <g transform="translate(850,100)" opacity="0.15" stroke="#c44040" fill="none">
    <polygon points="0,-40 40,0 0,40 -40,0" stroke-width="0.6"/>
    <polygon points="0,-28 28,0 0,28 -28,0" stroke-width="0.4"/>
    <polygon points="0,-16 16,0 0,16 -16,0" stroke-width="0.3"/>
  </g>

  <!-- ============ SCATTERED DOTS ============ -->

  <circle cx="480" cy="180" r="2" fill="#c44040" opacity="0.15"/>
  <circle cx="720" cy="520" r="2" fill="#932f2f" opacity="0.12"/>
  <circle cx="1250" cy="300" r="2.5" fill="#c44040" opacity="0.14"/>
  <circle cx="150" cy="500" r="2" fill="#932f2f" opacity="0.1"/>
  <circle cx="1500" cy="150" r="2" fill="#932f2f" opacity="0.12"/>
  <circle cx="950" cy="50" r="1.5" fill="#c44040" opacity="0.1"/>
  <circle cx="350" cy="550" r="1.5" fill="#932f2f" opacity="0.1"/>
</svg>
